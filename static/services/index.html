<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tollgate Services</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#f7931a;--purple:#7c3aed;--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e2e2e8;--dim:#6b6b7b;--up:#22c55e;--down:#ef4444;--pending:#eab308}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,rgba(247,147,26,0.08),rgba(124,58,237,0.08));border-bottom:1px solid var(--border);padding:2rem 1rem;text-align:center}
.header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--orange),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{color:var(--dim);font-size:0.85rem;margin-top:0.25rem}
.machine-tabs{display:flex;justify-content:center;gap:0.5rem;padding:1rem;flex-wrap:wrap}
.machine-tab{padding:0.5rem 1.5rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--dim);cursor:pointer;font-size:0.85rem;font-weight:600;transition:all 0.2s}
.machine-tab:hover{border-color:var(--purple)}
.machine-tab.active{border-color:var(--orange);color:var(--orange);background:rgba(247,147,26,0.08)}
.machine-tab .tab-count{font-size:0.7rem;margin-left:0.4rem}
.container{max-width:900px;margin:0 auto;padding:0 1rem 1rem}
.summary{display:flex;justify-content:center;gap:2rem;padding:0.5rem 1rem;flex-wrap:wrap}
.summary .stat{text-align:center}
.summary .stat .num{font-size:1.8rem;font-weight:700}
.summary .stat .label{font-size:0.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em}
.group-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin:1.2rem 0 0.5rem;padding-left:0.25rem;border-left:2px solid var(--purple)}
.service{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.35rem;background:var(--card);transition:border-color 0.2s}
.service:hover{border-color:var(--purple)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background 0.3s}
.dot.up{background:var(--up);box-shadow:0 0 6px var(--up)}
.dot.down{background:var(--down);box-shadow:0 0 6px var(--down);animation:pulse 2s infinite}
.dot.pending{background:var(--pending);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.info{flex:1;min-width:0}
.info .name{font-weight:600;font-size:0.85rem}
.info .url{font-size:0.7rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;text-decoration:none}
.info .url:hover{color:var(--purple)}
.meta{display:flex;align-items:center;gap:0.5rem;flex-shrink:0;font-size:0.7rem;color:var(--dim)}
.vps-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:10px}
.vps-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.vps-card .val{font-size:1.4rem;font-weight:700}
.vps-card .lbl{font-size:0.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
.vps-bar{height:5px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden}
.vps-bar .fill{height:100%;border-radius:3px;transition:width 0.5s}
.vps-procs{width:100%;border-collapse:collapse;font-size:0.65rem;margin-top:6px}
.vps-procs th{text-align:left;color:var(--dim);padding:3px 5px;border-bottom:1px solid var(--border)}
.vps-procs td{padding:2px 5px;border-bottom:1px solid var(--border)}
.vps-procs tr:hover{background:rgba(124,58,237,0.08)}
.backup-folder{display:flex;align-items:center;gap:0.75rem;padding:0.4rem 0.75rem 0.4rem 1.5rem;border:1px solid var(--border);border-radius:6px;margin-bottom:0.25rem;background:var(--card);font-size:0.8rem}
.backup-folder .pct{font-size:0.7rem;color:var(--dim);min-width:40px;text-align:right}
.backup-folder .local-info{font-size:0.65rem;color:var(--dim);margin-left:0.5rem}
.machine-row{display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0.75rem 0.25rem 2.5rem;font-size:0.7rem;color:var(--dim);border-left:1px solid var(--border);margin-left:1rem;margin-bottom:0.05rem}
.machine-row .machine-name{min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.machine-row .machine-size{color:var(--text);font-weight:500}
.machine-row .machine-status{font-size:0.6rem}
.backup-status-bar{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.35rem;background:var(--card);cursor:pointer;transition:border-color 0.2s}
.backup-status-bar:hover{border-color:var(--orange)}
.backup-status-bar .backup-time{font-size:0.65rem;color:var(--dim)}
.backup-detail{overflow:hidden;max-height:0;transition:max-height 0.3s ease}
.backup-detail.open{max-height:600px}
footer{text-align:center;padding:1rem;color:var(--dim);font-size:0.65rem;border-top:1px solid var(--border)}
footer .next-check{color:var(--orange)}
.hidden{display:none}
@media(max-width:600px){.meta{display:none}.service{padding:0.5rem}.vps-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<h1>Tollgate Services</h1>
<div class="subtitle">Infrastructure status for orangesync.tech — data collected on-server every 10 seconds</div>
</div>
<div class="machine-tabs" id="machine-tabs"></div>
<div class="summary" id="summary"></div>
<div class="container">
<div id="machine-content"></div>
<div id="backup-section" class="hidden">
<div class="group-title" style="border-left-color:var(--orange);margin-top:1rem">Backup Sync Status</div>
<div id="backup-overview"></div>
<div class="backup-detail open" id="backup-detail"></div>
</div>
</div>
<footer>Status data is collected on each VPS by a local agent every 10 seconds. No browser-side probing needed. <span class="next-check" id="next-check"></span></footer>
<script>
const MACHINE_APIS={
m1:{statusUrl:"vps-1-status.json",fallbackUrl:"vps-stats.json",label:"vps-1 (Primary)",ip:"66.92.204.38"},
m2:{statusUrl:"vps-2-status.json",label:"vps-2 (Secondary)",ip:"23.182.128.51"}
};

let currentMachine="m1";
let machineData={};

function barColor(pct){if(pct<60)return"var(--up)";if(pct<85)return"var(--pending)";return"var(--down)"}
function fmtBytes(b){if(!b)return"0B";if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"K";if(b<1073741824)return(b/1048576).toFixed(1)+"M";return(b/1073741824).toFixed(1)+"G"}

function renderTabs(){
const tabs=document.getElementById("machine-tabs");
let html="";
for(const[mid,cfg] of Object.entries(MACHINE_APIS)){
const data=machineData[mid];
let upCount="-",downCount="-";
if(data&&data.services){
const svcs=Object.values(data.services);
upCount=svcs.filter(s=>s.healthy).length;
downCount=svcs.length-upCount;
}
const active=mid===currentMachine?" active":"";
html+=`<div class="machine-tab${active}" onclick="switchMachine('${mid}')">${cfg.label}<span class="tab-count">${data?"("+upCount+" up / "+downCount+" down)":""}</span></div>`;
}
tabs.innerHTML=html;
}

function switchMachine(mid){
currentMachine=mid;
renderTabs();
renderContent();
}

function renderSummary(){
const summary=document.getElementById("summary");
let totalUp=0,totalDown=0,totalSvc=0;
for(const data of Object.values(machineData)){
if(!data||!data.services)continue;
const svcs=Object.values(data.services);
totalUp+=svcs.filter(s=>s.healthy).length;
totalDown+=svcs.length-svcs.filter(s=>s.healthy).length;
totalSvc+=svcs.length;
}
summary.innerHTML=`
<div class="stat"><div class="num" style="color:var(--up)">${totalUp}</div><div class="label">Operational</div></div>
<div class="stat"><div class="num" style="color:var(--down)">${totalDown}</div><div class="label">Down</div></div>
<div class="stat"><div class="num">${totalSvc}</div><div class="label">Total</div></div>`;
}

function renderContent(){
const container=document.getElementById("machine-content");
const data=machineData[currentMachine];
const cfg=MACHINE_APIS[currentMachine];
if(!data){
container.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--dim)">Loading ${cfg.label}...</div>`;
return;
}

const mem=data.memory||{};
const disk=data.disk||{};
const load=data.load||[0,0,0];
const cpuPct=data.cpu_percent||0;
const memPct=mem.percent||0;
const diskPct=disk.percent||0;
const uptime=data.uptime||{};
const services=data.services||{};
const procs=data.top_processes||[];
const docker=data.docker_containers||[];

let html=`
<div class="group-title" style="border-left-color:var(--up)">Resources — ${cfg.label} (${data.hostname||"?"})</div>
<div class="vps-stats">
<div class="vps-card"><div class="val" style="color:${barColor(cpuPct)}">${cpuPct}%</div><div class="lbl">CPU (${data.cpu_cores||"?"} cores)</div><div class="vps-bar"><div class="fill" style="width:${cpuPct}%;background:${barColor(cpuPct)}"></div></div></div>
<div class="vps-card"><div class="val" style="color:${barColor(memPct)}">${memPct}%</div><div class="lbl">RAM (${fmtBytes(mem.used_bytes)} / ${fmtBytes(mem.total_bytes)})</div><div class="vps-bar"><div class="fill" style="width:${memPct}%;background:${barColor(memPct)}"></div></div></div>
<div class="vps-card"><div class="val" style="color:${barColor(diskPct)}">${diskPct}%</div><div class="lbl">Disk (${fmtBytes(disk.used_bytes)} / ${fmtBytes(disk.total_bytes)})</div><div class="vps-bar"><div class="fill" style="width:${diskPct}%;background:${barColor(diskPct)}"></div></div></div>
<div class="vps-card"><div class="val">${load[0].toFixed(2)}</div><div class="lbl">Load (1/5/15m)</div><div style="font-size:0.6rem;color:var(--dim)">${load.map(l=>l.toFixed(2)).join(" / ")}</div></div>
<div class="vps-card"><div class="val">${uptime.human||"?"}</div><div class="lbl">Uptime</div></div>
</div>`;

const svcNames=Object.keys(services);
if(svcNames.length){
const upSvcs=svcNames.filter(n=>services[n].healthy);
const downSvcs=svcNames.filter(n=>!services[n].healthy);
html+=`<div class="group-title" style="border-left-color:var(--purple)">Services</div>`;
for(const name of upSvcs){
const s=services[name];
html+=`<div class="service"><div class="dot up"></div><div class="info"><div class="name">${name}</div></div><div class="meta">${s.ms?s.ms+"ms":""}</div></div>`;
}
for(const name of downSvcs){
const s=services[name];
html+=`<div class="service"><div class="dot down"></div><div class="info"><div class="name">${name}</div></div><div class="meta">${s.status?"status: "+s.status:"unreachable"}</div></div>`;
}
}

if(docker.length){
html+=`<div class="group-title" style="border-left-color:var(--dim)">Docker Containers</div><table class="vps-procs"><thead><tr><th>Container</th><th>CPU</th><th>Memory</th><th>Mem%</th></tr></thead><tbody>`;
for(const c of docker){html+=`<tr><td>${c.name}</td><td>${c.cpu_pct}</td><td>${c.mem_usage}</td><td>${c.mem_pct}</td></tr>`}
html+=`</tbody></table>`;
}

if(procs.length){
html+=`<div class="group-title" style="border-left-color:var(--dim)">Top Processes</div><table class="vps-procs"><thead><tr><th>PID</th><th>CPU%</th><th>MEM%</th><th>RSS</th><th>Command</th></tr></thead><tbody>`;
for(const p of procs.slice(0,8)){html+=`<tr><td>${p.pid}</td><td>${p.cpu_pct}</td><td>${p.mem_pct}</td><td>${p.rss_mb}M</td><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.command}</td></tr>`}
html+=`</tbody></table>`;
}

container.innerHTML=html;

const ts=data.timestamp;
if(ts){
const ago=Math.floor((Date.now()-new Date(ts).getTime())/1000);
document.getElementById("next-check").textContent=`Last update: ${ago<0?"just now":ago+"s ago"} (auto-refreshes every 10s)`;
}
}

async function fetchMachineStatus(){
const fetches=Object.entries(MACHINE_APIS).map(async([mid,cfg])=>{
try{
let r=await fetch(cfg.statusUrl+"?_="+Date.now());
if(!r.ok&&cfg.fallbackUrl){
r=await fetch(cfg.fallbackUrl+"?_="+Date.now());
}
if(!r.ok)return;
const data=await r.json();
if(!data.machine_id)data.machine_id=mid;
if(!data.services)data.services={};
machineData[mid]=data;
}catch(e){console.warn(`${mid} status fetch failed`,e)}
});
await Promise.all(fetches);
renderTabs();
renderSummary();
renderContent();
}

async function fetchBackupStatus(){
try{
const r=await fetch("backup-status.json?_="+Date.now());
if(!r.ok)return;
const data=await r.json();
renderBackupStatus(data);
}catch(e){console.warn("backup status fetch failed",e)}
}

function renderBackupStatus(data){
const section=document.getElementById("backup-section");
const overview=document.getElementById("backup-overview");
const detail=document.getElementById("backup-detail");
section.classList.remove("hidden");
const statusMap={synced:"up",syncing:"syncing",problem:"down"};
const dotClass=statusMap[data.overall_status]||"pending";
const statusLabel={synced:"All Synced",syncing:"Syncing...",problem:"Problem"}[data.overall_status]||data.overall_status;
const statusColor={synced:"var(--up)",syncing:"var(--pending)",problem:"var(--down)"}[data.overall_status]||"var(--dim)";
const timeAgo=data.last_backup?timeSince(new Date(data.last_backup)):"never";
const host=data.source_host||"?";
overview.innerHTML=`<div class="backup-status-bar" onclick="toggleBackupDetail()"><div class="dot ${dotClass}"></div><div class="info"><div class="name">Backup Sync — ${host}</div><span class="backup-time">Last backup: ${timeAgo}</span></div><div class="meta"><span style="font-size:0.8rem;font-weight:600;color:${statusColor}">${statusLabel}</span></div></div>`;
let detailHtml="";
for(const[id,f] of Object.entries(data.folders||{})){
const fDot=statusMap[f.state]||"pending";
detailHtml+=`<div class="backup-folder"><div class="dot ${fDot}"></div><div class="info"><div class="name">${f.label||id}</div></div><span class="local-info">${f.local_size_human||""}</span><span class="pct">${f.completion}%</span></div>`;
for(const[mname,m] of Object.entries(f.machines||{})){
const connIcon=m.connected?"●":"○";
const mDot=m.state==="synced"?"up":m.state==="syncing"?"syncing":"down";
detailHtml+=`<div class="machine-row"><span class="dot ${mDot}" style="width:6px;height:6px"></span><span class="machine-name">${connIcon} ${mname}</span><span class="machine-size">${m.global_size_human||"?"}</span><span class="machine-status">${m.completion===100?"✓":m.need_size_human+" left"}</span></div>`;
}
}
detail.innerHTML=detailHtml;
}

function toggleBackupDetail(){document.getElementById("backup-detail").classList.toggle("open")}

function timeSince(date){
const s=Math.floor((Date.now()-date.getTime())/1000);
if(s<60)return s+"s ago";
if(s<3600)return Math.floor(s/60)+"m ago";
if(s<86400)return Math.floor(s/3600)+"h ago";
return Math.floor(s/86400)+"d ago";
}

fetchMachineStatus();
fetchBackupStatus();
setInterval(fetchMachineStatus,10000);
setInterval(fetchBackupStatus,60000);
</script>
</body>
</html>
