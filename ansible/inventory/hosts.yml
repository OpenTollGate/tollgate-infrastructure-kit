all:
  hosts:
    tollgate-vps:
      ansible_host: "{{ lookup('env', 'VPS_IP') }}"
      ansible_user: "{{ lookup('env', 'VPS_USER') | default('debian', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_PRIVATE_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    tollgate-vps-old:
      ansible_host: "{{ lookup('env', 'OLD_VPS_IP') }}"
      ansible_user: "{{ lookup('env', 'OLD_VPS_USER') | default('debian', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_PRIVATE_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    tollgate-backup:
      ansible_host: "{{ lookup('env', 'BACKUP_MACHINE_HOST') }}"
      ansible_user: "{{ lookup('env', 'BACKUP_MACHINE_USER') | default('c03rad0r', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_PRIVATE_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
      ansible_python_interpreter: /usr/bin/python3
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
