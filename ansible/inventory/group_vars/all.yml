base_domain: "{{ lookup('env', 'BASE_DOMAIN') | default('tollgate.local', true) }}"
mint_domain: "{{ lookup('env', 'MINT_DOMAIN') | default('mints.' + base_domain, true) }}"

cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"
cloudflare_zone_id: "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') | default('', true) }}"
cloudflare_zone_name: "{{ base_domain }}"

vps_ip: "{{ lookup('env', 'VPS_IP') | default('127.0.0.1', true) }}"

acme_email: "{{ lookup('env', 'ACME_EMAIL') | default('admin@' + base_domain, true) }}"

strfry_port: 7777
obelisk_port: 8080
blossom_port: 3001
nsite_gateway_port: 3002
mint_base_port: 8085

shadowsocks_password: "{{ lookup('env', 'SHADOWSOCKS_PASSWORD') | default('tollgate-mptcp', true) }}"
shadowsocks_port: 65101
shadowsocks_method: "chacha20-ietf-poly1305"
glorytun_port: 65001
glorytun_enabled: true
mptcp_max_subflows: 8

fips_relay_urls: "{{ lookup('env', 'FIPS_RELAY_URLS') | default('wss://relay.damus.io,wss://nos.lol', true) }}"

obelisk_admin_npub: "{{ lookup('env', 'OBELISK_ADMIN_NPUB') | default('', true) }}"

grasp_port: 7334
grasp_domain: "git.{{ base_domain }}"
grasp_repo_url: "https://github.com/chebizarro/ngit-grasp-fork1.git"
grasp_archive_all: true
grasp_archive_read_only: false
grasp_bootstrap_relay_url: "wss://relay.{{ base_domain }}"

docker_network_name: tollgate-net

tollgate_base_dir: /opt/tollgate
tollgate_static_dir: /srv/tollgate

system_upgrade: false
manage_timezone: false
manage_firewall: false
manage_fail2ban: false
firewall_extra_ports: []

firewall_enabled: true
firewall_allowed_ports:
  - "22"
  - "80"
  - "443"
  - "7777"
  - "65001"
  - "65101"

routstr_port: 8000
routstr_domain: "routstr.{{ base_domain }}"
routstr_mint_rest_port: 8089
routstr_mint_grpc_port: 50055

cloudflare_subdomains:
  - relay
  - chat
  - blossom
  - nsite
  - releases
  - ci
  - git
  - routstr
  - vote
