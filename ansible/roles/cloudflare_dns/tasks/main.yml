---
- name: Validate Cloudflare API token
  uri:
    url: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: yes
  register: cf_verify
  failed_when: '"status" not in cf_verify.content'

- name: Get Cloudflare zone ID if not provided
  uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ cloudflare_zone_name }}"
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: yes
  register: cf_zone_response
  when: cloudflare_zone_id == ''

- name: Set zone ID from API response
  set_fact:
    cloudflare_zone_id_resolved: "{{ cloudflare_zone_id if cloudflare_zone_id != '' else (cf_zone_response.json.result[0].id) }}"
  when: cloudflare_zone_id != '' or (cf_zone_response.json.result | length > 0)

- name: Get existing DNS records
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id_resolved }}/dns_records?per_page=100"
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: yes
  register: cf_existing_records

- name: Build record map from existing DNS records
  set_fact:
    cf_record_map: >-
      {{ cf_record_map | default({}) | combine({item.name: item.id}) }}
  loop: "{{ cf_existing_records.json.result }}"
  when: item.type == 'A'
  no_log: true

- name: Upsert A records for service subdomains
  uri:
    url: >-
      {{ "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records/" + cf_record_map[item + '.' + base_domain]
         if (item + '.' + base_domain) in (cf_record_map | default({}))
         else "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records" }}
    method: >-
      {{ 'PUT' if (item + '.' + base_domain) in (cf_record_map | default({})) else 'POST' }}
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: A
      name: "{{ item }}.{{ base_domain }}"
      content: "{{ machine_ip | default(vps_ip) }}"
      ttl: 300
      proxied: false
    body_format: json
    status_code: [200, 400]
  loop: "{{ machine_cloudflare_subdomains | default(cloudflare_subdomains) }}"
  register: cf_upsert_result
  changed_when: cf_upsert_result.json.success is defined and cf_upsert_result.json.success

- name: Upsert A record for bare domain (m1 only)
  uri:
    url: >-
      {{ "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records/" + cf_record_map[base_domain]
         if base_domain in (cf_record_map | default({}))
         else "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records" }}
    method: >-
      {{ 'PUT' if base_domain in (cf_record_map | default({})) else 'POST' }}
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: A
      name: "{{ base_domain }}"
      content: "{{ machine_ip | default(vps_ip) }}"
      ttl: 300
      proxied: false
    body_format: json
    status_code: [200, 400]
  register: cf_bare_result
  when: machine_id is defined and machine_id == 'm1'

- name: Upsert wildcard A record for machine subdomain
  uri:
    url: >-
      {{ "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records/" + cf_record_map['*.' + machine_domain]
         if ('*.' + machine_domain) in (cf_record_map | default({}))
         else "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records" }}
    method: >-
      {{ 'PUT' if ('*.' + machine_domain) in (cf_record_map | default({})) else 'POST' }}
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: A
      name: "*.{{ machine_domain }}"
      content: "{{ machine_ip | default(vps_ip) }}"
      ttl: 300
      proxied: false
    body_format: json
    status_code: [200, 400]
  register: cf_machine_wildcard_result
  when: machine_domain is defined

- name: Upsert A record for machine domain root
  uri:
    url: >-
      {{ "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records/" + cf_record_map[machine_domain]
         if machine_domain in (cf_record_map | default({}))
         else "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records" }}
    method: >-
      {{ 'PUT' if machine_domain in (cf_record_map | default({})) else 'POST' }}
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: A
      name: "{{ machine_domain }}"
      content: "{{ machine_ip | default(vps_ip) }}"
      ttl: 300
      proxied: false
    body_format: json
    status_code: [200, 400]
  register: cf_machine_root_result
  when: machine_domain is defined

- name: Upsert wildcard A record for mints subdomain (m1 only)
  uri:
    url: >-
      {{ "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records/" + cf_record_map['*.' + mint_domain]
         if ('*.' + mint_domain) in (cf_record_map | default({}))
         else "https://api.cloudflare.com/client/v4/zones/" + cloudflare_zone_id_resolved + "/dns_records" }}
    method: >-
      {{ 'PUT' if ('*.' + mint_domain) in (cf_record_map | default({})) else 'POST' }}
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: A
      name: "*.{{ mint_domain }}"
      content: "{{ machine_ip | default(vps_ip) }}"
      ttl: 300
      proxied: false
    body_format: json
    status_code: [200, 400]
  register: cf_wildcard_result
  when: machine_id is defined and machine_id == 'm1'

- name: Display DNS update summary
  debug:
    msg: |
      DNS records updated for {{ machine_id | default('unknown') }} ({{ machine_ip | default(vps_ip) }}):
      {% for sub in (machine_cloudflare_subdomains | default(cloudflare_subdomains)) %}
        {{ sub }}.{{ base_domain }}
      {% endfor %}
        {{ base_domain }} (m1 only)
        *.{{ mint_domain }} (m1 only)
      {% if machine_domain is defined %}
        {{ machine_domain }}
        *.{{ machine_domain }}
      {% endif %}
