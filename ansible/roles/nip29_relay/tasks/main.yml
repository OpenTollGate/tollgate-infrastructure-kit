---
- name: Install build deps for strfry + strfry29
  apt:
    name:
      - build-essential
      - libgit2-dev
      - libboost-all-dev
      - libssl-dev
      - libzstd-dev
      - liblmdb-dev
      - libsecp256k1-dev
      - flatbuffers-compiler
      - libflatbuffers-dev
      - perl
      - git
      - golang
    state: present
    update_cache: yes

- name: Create nip29 directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ nip29_base_dir }}"
    - "{{ nip29_db_dir }}"
    - "{{ nip29_repos_dir }}"

- name: Check existing strfry source
  stat:
    path: "{{ nip29_repos_dir }}/strfry/.git"
  register: nip29_strfry_src

- name: Clone strfry source
  git:
    repo: "{{ nip29_strfry_repo_url }}"
    dest: "{{ nip29_repos_dir }}/strfry"
    depth: 1
    recursive: yes
  when: not nip29_strfry_src.stat.exists

- name: Build strfry
  command: make
  args:
    chdir: "{{ nip29_repos_dir }}/strfry"
    creates: "{{ nip29_repos_dir }}/strfry/strfry"
  environment:
    MAKEFLAGS: "-j{{ ansible_processor_vcpus | default(2) }}"

- name: Copy strfry binary
  copy:
    src: "{{ nip29_repos_dir }}/strfry/strfry"
    dest: "{{ nip29_base_dir }}/strfry"
    remote_src: yes
    mode: '0755'
    force: yes

- name: Check existing relay29 source
  stat:
    path: "{{ nip29_repos_dir }}/relay29/.git"
  register: nip29_relay29_src

- name: Clone relay29 source
  git:
    repo: "{{ nip29_relay29_repo_url }}"
    dest: "{{ nip29_repos_dir }}/relay29"
    depth: 1
  when: not nip29_relay29_src.stat.exists

- name: Build strfry29 plugin binary
  command: "go build -buildvcs=false -o strfry29-bin ./strfry29/"
  args:
    chdir: "{{ nip29_repos_dir }}/relay29"
    creates: "{{ nip29_repos_dir }}/relay29/strfry29-bin"
  environment:
    PATH: "/usr/local/go/bin:{{ ansible_env.PATH }}"

- name: Copy strfry29 plugin binary
  copy:
    src: "{{ nip29_repos_dir }}/relay29/strfry29-bin"
    dest: "{{ nip29_base_dir }}/strfry29-bin"
    remote_src: yes
    mode: '0755'
    force: yes

- name: Deploy strfry config
  template:
    src: strfry.conf.j2
    dest: "{{ nip29_base_dir }}/strfry.conf"
    mode: '0644'
  no_log: yes
  notify:
    - wipe strfry nip29 db
    - restart strfry nip29

- name: Convert relay secret key from nsec to hex
  shell: >-
    python3 -c "
    import os, sys
    s = os.environ['NIP29_RELAY_KEY'].strip()
    if s.startswith('nsec1'):
        CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l'
        pos = s.index('1') + 1
        data = [CHARSET.index(c) for c in s[pos:]]
        data = data[:-6]
        acc = 0; bits = 0; val = []
        for d in data:
            acc = ((acc << 5) | d) & ((1 << 13) - 1)
            bits += 5
            while bits >= 8:
                bits -= 8
                val.append((acc >> bits) & 0xff)
        print(bytes(val).hex())
    else:
        print(s)
    "
  environment:
    NIP29_RELAY_KEY: "{{ nip29_relay_nsec }}"
  register: nip29_relay_hex_key
  changed_when: false
  no_log: yes

- name: Deploy strfry29 config
  template:
    src: strfry29.json.j2
    dest: "{{ nip29_base_dir }}/strfry29.json"
    mode: '0644'
  no_log: yes
  notify:
    - wipe strfry nip29 db
    - restart strfry nip29

- name: Deploy strfry systemd service
  template:
    src: strfry.service.j2
    dest: /etc/systemd/system/strfry-nip29.service
    mode: '0644'
  notify: restart strfry nip29

- name: Deploy sync script
  template:
    src: sync-peers.sh.j2
    dest: "{{ nip29_base_dir }}/sync-peers.sh"
    mode: '0755'

- name: Ensure sync log file exists
  file:
    path: /var/log/strfry-nip29-sync.log
    state: touch
    mode: '0644'
    access_time: preserve
    modification_time: preserve

- name: Deploy sync systemd service
  template:
    src: strfry-nip29-sync.service.j2
    dest: /etc/systemd/system/strfry-nip29-sync.service
    mode: '0644'

- name: Deploy sync systemd timer
  template:
    src: strfry-nip29-sync.timer.j2
    dest: /etc/systemd/system/strfry-nip29-sync.timer
    mode: '0644'

- name: Raise fs.nr_open for LimitNOFILE
  sysctl:
    name: fs.nr_open
    value: "2097152"
    state: present
    reload: yes

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start strfry nip29 service
  systemd:
    name: strfry-nip29
    state: started
    enabled: yes

- name: Enable and start sync timer
  systemd:
    name: strfry-nip29-sync.timer
    state: started
    enabled: yes

- name: Wait for relay port
  wait_for:
    port: "{{ nip29_port }}"
    host: "127.0.0.1"
    timeout: 30

- name: Display NIP-29 relay deployment info
  debug:
    msg: |
      NIP-29 relay deployed!
      Bind: {{ nip29_bind }}:{{ nip29_port }}
      Base dir: {{ nip29_base_dir }}
      Domain: {{ nip29_domain | default('(unset)') }}
      strfry: {{ nip29_base_dir }}/strfry
      strfry29: {{ nip29_base_dir }}/strfry29-bin
      Sync peers: {{ nip29_sync_peers | join(', ') }}
      Sync interval: every {{ nip29_sync_interval_min }} min
