---
- name: Install python3-websockets (for kind-3 fetch fallback)
  apt:
    name: python3-websockets
    state: present
  when: wot_sync_install_websockets | bool
  tags: grasp_wot

# --- Blossom WoT enforcement -------------------------------------------------

- name: Install blossom-wot-enforce script
  copy:
    src: blossom_wot_enforce.py
    dest: /usr/local/bin/blossom-wot-enforce
    owner: root
    group: root
    mode: "0755"
  tags: blossom_wot

- name: Deploy blossom-wot-enforce systemd service
  template:
    src: blossom-wot-enforce.service.j2
    dest: /etc/systemd/system/blossom-wot-enforce.service
    mode: "0644"
  notify: reload systemd
  tags: blossom_wot

- name: Deploy blossom-wot-enforce systemd timer
  template:
    src: blossom-wot-enforce.timer.j2
    dest: /etc/systemd/system/blossom-wot-enforce.timer
    mode: "0644"
  notify: reload systemd
  tags: blossom_wot

- name: Enable blossom-wot-enforce timer
  systemd:
    name: blossom-wot-enforce.timer
    enabled: yes
    state: started
    daemon_reload: yes
  tags: blossom_wot

# --- grasp-mirror dynamic sync -----------------------------------------------

- name: Install grasp-mirror-sync script
  copy:
    src: grasp_mirror_sync.py
    dest: /usr/local/bin/grasp-mirror-sync
    owner: root
    group: root
    mode: "0755"
  tags: grasp_wot

- name: Deploy grasp-mirror-sync systemd service
  template:
    src: grasp-mirror-sync.service.j2
    dest: /etc/systemd/system/grasp-mirror-sync.service
    mode: "0644"
  notify: reload systemd
  tags: grasp_wot

- name: Deploy grasp-mirror-sync systemd timer
  template:
    src: grasp-mirror-sync.timer.j2
    dest: /etc/systemd/system/grasp-mirror-sync.timer
    mode: "0644"
  notify: reload systemd
  tags: grasp_wot

- name: Enable grasp-mirror-sync timer
  systemd:
    name: grasp-mirror-sync.timer
    enabled: yes
    state: started
    daemon_reload: yes
  tags: grasp_wot
