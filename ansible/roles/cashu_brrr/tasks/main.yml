---
- name: Install Node.js and npm
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - nodejs
    - npm
  when: cashu_brrr_local_repo | length == 0

- name: Ensure static directory exists
  file:
    path: "{{ cashu_brrr_static_dir }}"
    state: directory
    mode: "0755"

- name: Clone or update cashu-brrr repository
  git:
    repo: "{{ cashu_brrr_repo_url }}"
    dest: "{{ tollgate_base_dir }}/src/cashu-brrr"
    version: "{{ cashu_brrr_repo_branch }}"
    force: yes
  when: cashu_brrr_local_repo | length == 0

- name: Build cashu-brrr frontend
  shell: |
    npm install
    npm run build
  args:
    chdir: "{{ tollgate_base_dir }}/src/cashu-brrr"
  when: cashu_brrr_local_repo | length == 0
  register: cashu_build

- name: Copy local build if provided
  copy:
    src: "{{ cashu_brrr_local_repo }}/dist/"
    dest: "{{ cashu_brrr_static_dir }}/"
    mode: "0644"
  when: cashu_brrr_local_repo | length > 0

- name: Copy built files to static dir
  copy:
    src: "{{ tollgate_base_dir }}/src/cashu-brrr/dist/"
    dest: "{{ cashu_brrr_static_dir }}/"
    remote_src: yes
    mode: "0644"
  when: cashu_brrr_local_repo | length == 0

- name: Add Caddy route for cashu-brrr
  shell: |
    grep -q '{{ cashu_brrr_domain }}' /opt/tollgate/caddy/Caddyfile || (
      echo '' >> /opt/tollgate/caddy/Caddyfile
      echo '{{ cashu_brrr_domain }} {' >> /opt/tollgate/caddy/Caddyfile
      echo '    tls {' >> /opt/tollgate/caddy/Caddyfile
      echo '        dns cloudflare {env.CF_API_TOKEN}' >> /opt/tollgate/caddy/Caddyfile
      echo '    }' >> /opt/tollgate/caddy/Caddyfile
      echo '    root * {{ cashu_brrr_static_dir }}' >> /opt/tollgate/caddy/Caddyfile
      echo '    file_server' >> /opt/tollgate/caddy/Caddyfile
      echo '    try_files {path} /index.html' >> /opt/tollgate/caddy/Caddyfile
      echo '}' >> /opt/tollgate/caddy/Caddyfile
    )
  args:
    executable: /bin/bash
  notify: reload caddy

- name: Display cashu-brrr info
  debug:
    msg: "cashu-brrr deployed at https://{{ cashu_brrr_domain }}"
