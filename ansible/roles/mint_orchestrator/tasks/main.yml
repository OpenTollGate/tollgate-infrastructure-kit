---
- name: Create tollgate mint directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ tollgate_base_dir }}/mints"
    - "{{ tollgate_base_dir }}/mints-dashboard"
    - "/var/log/tollgate"
    - "{{ tollgate_base_dir }}/mint-orchestrator-venv"

- name: Create empty registry if not exists
  copy:
    dest: "{{ tollgate_base_dir }}/mints/registry.json"
    content: '{"mints":[]}'
    force: no
    mode: "0644"

- name: Copy dashboard files
  copy:
    src: "{{ playbook_dir }}/../../../mint-dashboard/"
    dest: "{{ tollgate_base_dir }}/mints-dashboard/"
    mode: "0644"
  failed_when: false

- name: Install Python venv and dependencies
  pip:
    name: "file://{{ playbook_dir }}/../../../mint-orchestrator"
    virtualenv: "{{ tollgate_base_dir }}/mint-orchestrator-venv"
    virtualenv_command: python3 -m venv

- name: Create orchestrator systemd unit
  template:
    src: tollgate-mint-orchestrator.service.j2
    dest: /etc/systemd/system/tollgate-mint-orchestrator.service
    mode: "0644"
  notify: restart mint orchestrator

- name: Enable and start orchestrator
  systemd:
    name: tollgate-mint-orchestrator
    state: started
    enabled: yes
    daemon_reload: yes

- name: Add dashboard route to Caddyfile
  shell: |
    grep -q 'dashboard.{{ mint_domain }}' /opt/tollgate/caddy/Caddyfile || (
      echo '' >> /opt/tollgate/caddy/Caddyfile
      echo 'dashboard.{{ mint_domain }} {' >> /opt/tollgate/caddy/Caddyfile
      echo '    tls {' >> /opt/tollgate/caddy/Caddyfile
      echo '        dns cloudflare {env.CF_API_TOKEN}' >> /opt/tollgate/caddy/Caddyfile
      echo '    }' >> /opt/tollgate/caddy/Caddyfile
      echo '    root * {{ tollgate_base_dir }}/mints-dashboard' >> /opt/tollgate/caddy/Caddyfile
      echo '    file_server' >> /opt/tollgate/caddy/Caddyfile
      echo '}' >> /opt/tollgate/caddy/Caddyfile
    )
  args:
    executable: /bin/bash
  notify: reload caddy
