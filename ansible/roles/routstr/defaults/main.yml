---
routstr_port: 8000
routstr_rest_port: 8000
routstr_tor_enabled: true
routstr_data_dir: "{{ tollgate_base_dir }}/routstr/data"
routstr_log_dir: "{{ tollgate_base_dir }}/routstr/logs"
routstr_tor_dir: "{{ tollgate_base_dir }}/routstr/tor-data"
routstr_container_name: tollgate-routstr
routstr_tor_container_name: tollgate-routstr-tor
routstr_image: "ghcr.io/routstr/proxy:latest"
routstr_tor_image: "ghcr.io/hundehausen/tor-hidden-service:latest"
routstr_domain: "routstr.{{ base_domain }}"

routstr_mint_subdomain: routstr-mint
routstr_mint_rest_port: 8089
routstr_mint_grpc_port: 50055
routstr_mint_container_name: "mint-routstr-mint"
routstr_mint_url: "https://{{ routstr_mint_subdomain }}.{{ mint_domain }}"
routstr_mint_units: "sat,msat"

routstr_operator_npub: "npub1zzt0d0s2f4lsanpd7nkjep5r79p7ljq7aw37eek64hf0ef6v0mxqgwljrv"
