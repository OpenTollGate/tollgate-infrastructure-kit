---
- name: Check if Syncthing is installed locally
  command: which syncthing
  register: local_syncthing_check
  changed_when: false
  failed_when: false

- name: Install Syncthing locally (Debian/Ubuntu)
  apt:
    name: syncthing
    state: present
  become: no
  when: false

- name: Fail if syncthing not installed
  fail:
    msg: "Syncthing must be installed on localhost"
  when: local_syncthing_check.rc != 0

- name: Create local backup directories
  file:
    path: "{{ syncthing_local_backup_root }}/{{ item.label | lower | replace(' ', '-') }}"
    state: directory
    mode: '0755'
  loop: "{{ syncthing_backup_dirs }}"
  loop_control:
    label: "{{ item.id }}"

- name: Ensure local syncthing config directory exists
  file:
    path: "{{ syncthing_local_config_dir }}"
    state: directory
    mode: '0700'

- name: Generate local syncthing config if needed
  command: "syncthing --generate={{ syncthing_local_config_dir }}"
  args:
    creates: "{{ syncthing_local_config_dir }}/config.xml"

- name: Configure local syncthing listen port
  xml:
    path: "{{ syncthing_local_config_dir }}/config.xml"
    xpath: /configuration/options/listenAddress
    value: "tcp://0.0.0.0:{{ syncthing_local_listen_port }}"

- name: Configure local syncthing GUI address
  xml:
    path: "{{ syncthing_local_config_dir }}/config.xml"
    xpath: /configuration/gui/address
    value: "127.0.0.1:{{ syncthing_local_gui_port }}"

- name: Remove default folder from local config
  xml:
    path: "{{ syncthing_local_config_dir }}/config.xml"
    xpath: /configuration/folder[@id='default']
    state: absent

- name: Check if local syncthing user service is running
  command: systemctl --user is-active syncthing
  register: local_syncthing_active
  changed_when: false
  failed_when: false

- name: Check if root syncthing is occupying our ports
  wait_for:
    port: "{{ syncthing_local_gui_port }}"
    host: 127.0.0.1
    timeout: 1
  register: port_check
  failed_when: false

- name: Stop root syncthing if occupying ports
  systemd:
    name: syncthing@root
    state: stopped
    enabled: no
  failed_when: false
  when: port_check.failed == false and local_syncthing_active.rc != 0

- name: Enable lingering for current user
  command: "loginctl enable-linger {{ ansible_user_id }}"
  when: ansible_user_id != 'root'

- name: Enable and start local syncthing user service
  systemd:
    name: syncthing
    scope: user
    state: started
    enabled: yes

- name: Wait for local syncthing API
  wait_for:
    port: "{{ syncthing_local_gui_port }}"
    host: 127.0.0.1
    delay: 3
    timeout: 30

- name: Get local syncthing device ID
  command: syncthing --device-id
  register: local_device_id_raw
  changed_when: false

- name: Set local device ID fact
  set_fact:
    local_syncthing_id: "{{ local_device_id_raw.stdout | trim }}"

- name: Get local syncthing API key
  command: "grep -oP '(?<=<apikey>)[^<]+' {{ syncthing_local_config_dir }}/config.xml"
  register: local_api_key_raw
  changed_when: false

- name: Set local API key fact
  set_fact:
    local_syncthing_api_key: "{{ local_api_key_raw.stdout | trim }}"
