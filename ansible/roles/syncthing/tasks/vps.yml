---
- name: Install Syncthing
  apt:
    name: syncthing
    state: present
    update_cache: yes

- name: Create syncthing user
  user:
    name: "{{ syncthing_user }}"
    system: yes
    home: "{{ syncthing_home }}"
    create_home: yes
    shell: /usr/sbin/nologin
    groups: docker
    append: yes

- name: Ensure syncthing config directory exists
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ syncthing_user }}"
    group: "{{ syncthing_user }}"
    mode: '0700'
  loop:
    - "{{ syncthing_config_dir }}"
    - "{{ syncthing_home }}/.local/state/syncthing"

- name: Generate initial Syncthing config
  command: syncthing --generate="{{ syncthing_config_dir }}"
  args:
    creates: "{{ syncthing_config_dir }}/config.xml"
  environment:
    HOME: "{{ syncthing_home }}"
  ignore_errors: yes

- name: Fix ownership of syncthing config
  file:
    path: "{{ syncthing_config_dir }}"
    owner: "{{ syncthing_user }}"
    group: "{{ syncthing_user }}"
    recurse: yes

- name: Install lxml for xml module
  apt:
    name: python3-lxml
    state: present

- name: Bind GUI to localhost only
  xml:
    path: "{{ syncthing_config_dir }}/config.xml"
    xpath: /configuration/gui/address
    value: "127.0.0.1:8384"
  register: syncthing_gui_bind
  notify: Restart syncthing

- name: Disable global discovery (VPS uses direct connection)
  xml:
    path: "{{ syncthing_config_dir }}/config.xml"
    xpath: /configuration/options/globalAnnounceEnabled
    value: "false"
  register: syncthing_global_discovery
  notify: Restart syncthing

- name: Enable local discovery
  xml:
    path: "{{ syncthing_config_dir }}/config.xml"
    xpath: /configuration/options/localAnnounceEnabled
    value: "true"
  register: syncthing_local_discovery
  notify: Restart syncthing

- name: Remove default folder
  xml:
    path: "{{ syncthing_config_dir }}/config.xml"
    xpath: /configuration/folder[@id='default']
    state: absent
  register: syncthing_remove_default
  notify: Restart syncthing

- name: Deploy syncthing systemd service
  copy:
    dest: /etc/systemd/system/syncthing@.service
    content: |
      [Unit]
      Description=Syncthing - %i
      After=network.target

      [Service]
      User=%i
      ExecStart=/usr/bin/syncthing -no-browser -no-restart -logflags=0
      Restart=on-failure
      RestartSec=5
      SuccessExitStatus=3 4 5
      Environment=STNODEFAULTFOLDER=1

      [Install]
      WantedBy=multi-user.target
    mode: '0644'

- name: Enable and start syncthing
  systemd:
    name: "syncthing@{{ syncthing_user }}"
    state: started
    enabled: yes
    daemon_reload: yes

- name: Restart syncthing if config changed
  systemd:
    name: "syncthing@{{ syncthing_user }}"
    state: restarted
  when: >
    (syncthing_gui_bind is defined and syncthing_gui_bind.changed) or
    (syncthing_global_discovery is defined and syncthing_global_discovery.changed) or
    (syncthing_local_discovery is defined and syncthing_local_discovery.changed) or
    (syncthing_remove_default is defined and syncthing_remove_default.changed)

- name: Wait for syncthing to be ready
  wait_for:
    port: 8384
    host: 127.0.0.1
    delay: 3
    timeout: 30

- name: Get syncthing device ID
  become_user: "{{ syncthing_user }}"
  command: syncthing --device-id
  register: syncthing_device_id
  changed_when: false

- name: Store device ID as fact
  set_fact:
    vps_syncthing_id: "{{ syncthing_device_id.stdout | trim }}"

- name: Display device ID
  debug:
    msg: "VPS Syncthing Device ID: {{ vps_syncthing_id }}"

- name: Open Syncthing port in firewall
  ufw:
    rule: allow
    port: '22000'
    proto: tcp
    comment: 'Syncthing sync'
  when: manage_firewall | default(false)
  ignore_errors: yes
