---
- name: Check for existing Relatr keys in .env
  slurp:
    src: /opt/tollgate/.env
  register: relatr_env_file
  failed_when: false

- name: Check if RELATR_SERVER_SECRET_KEY already in .env
  set_fact:
    relatr_secret_key_exists: "{{ relatr_env_file.content is defined and 'RELATR_SERVER_SECRET_KEY=' in (relatr_env_file.content | b64decode) }}"

- name: Generate RELATR_SERVER_SECRET_KEY if missing
  shell: |
    SECRET=$(openssl rand -hex 32)
    echo "RELATR_SERVER_SECRET_KEY=${SECRET}" >> /opt/tollgate/.env
  when: not relatr_secret_key_exists

- name: Check if RELATR_SOURCE_NPUB_HEX already in .env
  set_fact:
    relatr_npub_exists: "{{ relatr_env_file.content is defined and 'RELATR_SOURCE_NPUB_HEX=' in (relatr_env_file.content | b64decode) }}"

- name: Install pynostr and PyNaCl for keypair generation
  pip:
    name:
      - pynostr
      - PyNaCl
    state: present
    extra_args: "--break-system-packages"
  when: not relatr_npub_exists

- name: Generate Relatr Nostr keypair if missing
  shell: |
    set -o pipefail
    python3 << 'PYEOF'
    import secrets, json
    from bech32 import bech32_encode, convertbits
    from nacl.signing import SigningKey
    sk = secrets.token_bytes(32)
    nsec = bech32_encode('nsec', convertbits(sk, 8, 5))
    signing_key = SigningKey(sk)
    pk = bytes(signing_key.verify_key)
    npub = bech32_encode('npub', convertbits(pk, 8, 5))
    print(json.dumps({'nsec': nsec, 'npub': npub, 'hex_sk': sk.hex(), 'hex_pk': pk.hex()}))
    PYEOF
  register: relatr_keypair
  when: not relatr_npub_exists

- name: Store Relatr keypair in .env
  shell: |
    echo "RELATR_SOURCE_NPUB_HEX=$(echo '{{ relatr_keypair.stdout }}' | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"hex_pk\"])')" >> /opt/tollgate/.env
    echo "RELATR_NSEC=$(echo '{{ relatr_keypair.stdout }}' | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"nsec\"])')" >> /opt/tollgate/.env
    echo "RELATR_NPUB=$(echo '{{ relatr_keypair.stdout }}' | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"npub\"])')" >> /opt/tollgate/.env
  when: not relatr_npub_exists

- name: Read Relatr keys from .env
  shell: "grep {{ item }} /opt/tollgate/.env | cut -d= -f2"
  register: relatr_env_keys
  loop:
    - RELATR_SERVER_SECRET_KEY
    - RELATR_SOURCE_NPUB_HEX
  changed_when: false

- name: Set Relatr key facts
  set_fact:
    relatr_server_secret_key: "{{ relatr_env_keys.results[0].stdout }}"
    relatr_source_npub_hex: "{{ relatr_env_keys.results[1].stdout }}"

- name: Install build dependencies for Relatr
  apt:
    name:
      - git
      - ca-certificates
    state: present

- name: Ensure Relatra source directory exists
  file:
    path: "{{ tollgate_base_dir }}/relatr/src"
    state: directory
    mode: '0755'

- name: Clone Relatr repository
  git:
    repo: "https://github.com/ContextVM/relatr.git"
    dest: "{{ tollgate_base_dir }}/relatr/src"
    depth: 1
    force: yes
  register: relatr_clone

- name: Create Relatr directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ relatr_data_dir }}"
    - "{{ relatr_plugins_dir }}"

- name: Initialize WoT cache file
  copy:
    content: '{}'
    dest: "{{ relatr_wot_cache_file }}"
    mode: '0644'
    force: no

- name: Deploy Relatr docker-compose
  template:
    src: docker-compose.relatr.yml.j2
    dest: "{{ tollgate_base_dir }}/relatr/docker-compose.yml"
    mode: '0644'
  notify: restart relatr

- name: Build Relatr Docker image
  shell: |
    cd {{ tollgate_base_dir }}/relatr
    docker compose build --no-cache 2>&1
  register: relatr_build
  changed_when: "'Successfully built' in relatr_build.stdout or 'Successfully tagged' in relatr_build.stdout or 'Building' in relatr_build.stdout"
  when: relatr_clone.changed

- name: Start Relatr container
  community.docker.docker_compose_v2:
    project_src: "{{ tollgate_base_dir }}/relatr"
    state: present
    build: "{{ 'always' if relatr_clone.changed else 'never' }}"
  register: relatr_deploy

- name: Wait for Relatr to start
  uri:
    url: "http://localhost:{{ relatr_port }}"
    return_content: yes
  register: relatr_health
  until: relatr_health.status == 200
  retries: 30
  delay: 5

- name: Verify Relatr is accessible via Caddy
  uri:
    url: "https://{{ relatr_domain }}"
    return_content: yes
    validate_certs: no
  register: relatr_caddy_health
  until: relatr_caddy_health.status == 200
  retries: 15
  delay: 3

- name: Deploy trust API server script
  copy:
    src: trust-api-server.py
    dest: "{{ tollgate_base_dir }}/relatr/trust-api-server.py"
    mode: '0755'

- name: Deploy trust API systemd unit
  template:
    src: trust-api.service.j2
    dest: /etc/systemd/system/trust-api.service
    mode: '0644'
  notify: restart trust-api

- name: Enable and start trust API
  systemd:
    name: trust-api
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for trust API
  uri:
    url: "http://localhost:{{ relatr_trust_api_port }}/health"
    return_content: yes
  register: trust_api_health
  until: trust_api_health.status == 200
  retries: 15
  delay: 3

- name: Deploy strfry WoT write-policy script
  copy:
    src: strfry-wot-policy.sh
    dest: "{{ tollgate_base_dir }}/relatr/strfry-wot-policy.sh"
    mode: '0755'
  notify: restart ngit-strfry

- name: Deploy GRASP trust filter script
  copy:
    src: grasp-trust-filter.sh
    dest: "{{ tollgate_base_dir }}/relatr/grasp-trust-filter.sh"
    mode: '0755'

- name: Display Relatr deployment info
  debug:
    msg: |
      Relatr WoT service deployed successfully!
      Config UI: https://{{ relatr_domain }}
      Relatr API: http://localhost:{{ relatr_port }}
      Trust API: http://localhost:{{ relatr_trust_api_port }}
      Source pubkey: {{ relatr_source_npub_hex }}
      WoT hops: {{ relatr_number_of_hops }}
      Min trust score: {{ relatr_wot_min_trust_score }}
      Trust cache: {{ relatr_wot_cache_file }}
      Write policy: {{ tollgate_base_dir }}/relatr/strfry-wot-policy.sh
