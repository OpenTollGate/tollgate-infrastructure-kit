---
- name: Install build dependencies for grasp-mirror
  apt:
    name:
      - build-essential
      - pkg-config
      - libssl-dev
      - git
      - libsqlite3-dev
      - rsync
    state: present

- name: Ensure Rust is installed
  shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/rustup"

- name: Pin Rust {{ grasp_mirror_rust_version }} for nostr-sdk 0.39 compatibility
  shell: |
    {{ ansible_env.HOME }}/.cargo/bin/rustup install {{ grasp_mirror_rust_version }}
    {{ ansible_env.HOME }}/.cargo/bin/rustup default {{ grasp_mirror_rust_version }}
  args:
    executable: /bin/bash

- name: Ensure source directory exists
  file:
    path: "{{ grasp_mirror_source_dir }}"
    state: directory
    mode: '0755'

- name: Clone grasp-mirror via local GRASP
  shell: |
    git clone http://localhost:{{ grasp_port }}/npub12m5exm2uk3xa674cc5r0hlyvccs5xxn7qv83ezuteefv5972nquq4j4szl/grasp-mirror.git {{ grasp_mirror_source_dir }}
  args:
    creates: "{{ grasp_mirror_source_dir }}/.git/HEAD"

- name: Update grasp-mirror source
  shell: |
    cd {{ grasp_mirror_source_dir }}
    git fetch origin
    git reset --hard origin/master
  register: grasp_mirror_source_update
  changed_when: "'HEAD is now at' in grasp_mirror_source_update.stdout"

- name: Ensure data directory exists
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ grasp_mirror_data_dir }}"
    - "{{ grasp_mirror_data_dir }}/repos"

- name: Deploy grasp-mirror config
  template:
    src: config.toml.j2
    dest: "{{ grasp_mirror_data_dir }}/config.toml"
    mode: '0644'
  notify: restart grasp-mirror

- name: Deploy grasp-mirror environment file
  template:
    src: grasp-mirror.env.j2
    dest: "{{ grasp_mirror_data_dir }}/grasp-mirror.env"
    mode: '0600'
  notify: restart grasp-mirror

- name: Build grasp-mirror (release)
  shell: |
    cd {{ grasp_mirror_source_dir }}
    {{ ansible_env.HOME }}/.cargo/bin/cargo build --release
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"
  register: grasp_mirror_build
  changed_when: "'Compiling' in grasp_mirror_build.stderr"

- name: Install grasp-mirror binary
  copy:
    src: "{{ grasp_mirror_source_dir }}/target/release/grasp-mirror"
    dest: /usr/local/bin/grasp-mirror
    mode: '0755'
    remote_src: yes
  notify: restart grasp-mirror

- name: Deploy grasp-mirror systemd unit
  template:
    src: grasp-mirror.service.j2
    dest: /etc/systemd/system/grasp-mirror.service
    mode: '0644'
  notify: restart grasp-mirror

- name: Enable and start grasp-mirror
  systemd:
    name: grasp-mirror
    state: started
    enabled: yes
    daemon_reload: yes
