---
# 40-wot-sync.yml — Deploy kind-3 WoT sync to Blossom + grasp-mirror.
#
# The strfry-agg-reconcile timer (on vps2) writes allowed.npubs from the root
# npub's kind-3 every 15 min. This role deploys two consumers:
#
#   * blossom-wot-enforce  (tag: blossom_wot)  — purges Blossom blobs whose
#     owners are all outside the allowlist. Targets the Blossom host (vps1).
#   * grasp-mirror-sync    (tag: grasp_wot)    — rewrites the daemon's
#     MIRROR_NPUBS env from the allowlist / kind-3 and restarts it. Targets
#     the grasp-mirror host.
#
# Deploy selectively:
#   ansible-playbook 40-wot-sync.yml -l vps1 --tags blossom_wot
#   ansible-playbook 40-wot-sync.yml -l <grasp-host> --tags grasp_wot
#   ansible-playbook 40-wot-sync.yml                 # both, all targeted hosts

- name: Deploy Blossom WoT enforcement
  hosts: "{{ blossom_target | default('vps1') }}"
  become: yes
  gather_facts: yes
  ignore_unreachable: true
  roles:
    - role: wot_sync
      tags: [blossom_wot]

- name: Deploy grasp-mirror dynamic WoT sync
  hosts: "{{ grasp_target | default('vps1') }}"
  become: yes
  gather_facts: yes
  ignore_unreachable: true
  roles:
    - role: wot_sync
      tags: [grasp_wot]
